            // ---- Custom Drag & Drop (vertical only, mouse + touch) ----
            const dragRef = useRef({ id: null, startY: 0, el: null, cards: [], targetId: null });

            const onCustomDragStart = (e, id) => {
                e.preventDefault();
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const container = e.currentTarget.closest('.swipe-container');
                if (!container) return;

                const card = container.querySelector('.task-card');
                card.classList.add('custom-dragging');
                container.style.zIndex = '50';

                const allContainers = Array.from(document.querySelectorAll('.swipe-container[data-task-id]'));
                isDraggingRef.current = true;
                dragRef.current = { id, startY: clientY, el: container, card, cards: allContainers, targetId: null };

                const onMove = (ev) => {
                    ev.preventDefault();
                    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
                    const dy = cy - dragRef.current.startY;
                    dragRef.current.el.style.transform = `translateY(${dy}px)`;

                    // Detect drop target
                    dragRef.current.targetId = null;
                    dragRef.current.cards.forEach(c => {
                        const tc = c.querySelector('.task-card');
                        if (tc) tc.classList.remove('drag-over');
                        if (c === dragRef.current.el) return;
                        const r = c.getBoundingClientRect();
                        if (cy > r.top && cy < r.bottom) {
                            if (tc) tc.classList.add('drag-over');
                            dragRef.current.targetId = parseInt(c.dataset.taskId);
                        }
                    });
                };

                const onEnd = async () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onEnd);

                    const { el, card: c, targetId: tid } = dragRef.current;
                    el.style.transition = 'transform 0.2s ease';
                    el.style.transform = '';
                    el.style.zIndex = '';
                    setTimeout(() => { el.style.transition = ''; }, 200);
                    c.classList.remove('custom-dragging');
                    document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));

                    if (tid && tid !== id) {
                        const currentSorted = sortTasks(scopeTasks);
                        const dragIndex = currentSorted.findIndex(t => t.id === id);
                        const targetIndex = currentSorted.findIndex(t => t.id === tid);
                        if (dragIndex !== -1 && targetIndex !== -1) {
                            const newOrder = [...currentSorted];
                            const [moved] = newOrder.splice(dragIndex, 1);
                            newOrder.splice(targetIndex, 0, moved);
                            const updates = newOrder.map((t, i) => ({ id: t.id, position: i }));
                            const prevTasks = tasks;
                            setTasks(prev => prev.map(t => { const u = updates.find(u => u.id === t.id); return u ? { ...t, position: u.position } : t; }));
                            // Atomique : 1 RPC au lieu de N updates séquentiels
                            await safeWrite(
                                supabase.rpc('update_task_positions', { p_updates: updates }),
                                () => setTasks(prevTasks)
                            );
                        }
                    }
                    dragRef.current.id = null;
                    isDraggingRef.current = false;
                };

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd);
            };

            // ---- Mobile Move Up/Down (swap atomique via RPC) ----
            const swapPositions = async (id, dir) => {
                const sorted = sortTasks(filtered);
                const idx = sorted.findIndex(t => t.id === id);
                const j = idx + dir;
                if (idx === -1 || j < 0 || j >= sorted.length) return;
                const a = sorted[idx], b = sorted[j];
                const updates = [
                    { id: a.id, position: b.position },
                    { id: b.id, position: a.position },
                ];
                const prevTasks = tasks;
                setTasks(prev => prev.map(t => t.id === a.id ? { ...t, position: b.position } : t.id === b.id ? { ...t, position: a.position } : t));
                await safeWrite(
                    supabase.rpc('update_task_positions', { p_updates: updates }),
                    () => setTasks(prevTasks)
                );
            };
            const onMoveUp = (id) => swapPositions(id, -1);
            const onMoveDown = (id) => swapPositions(id, 1);

            // Push deadline by +1 day
            const pushDeadline = async (id) => {
                const task = tasks.find(t => t.id === id);
                if (!task || !task.deadline || task.done) return;
                const d = new Date(task.deadline + 'T00:00:00Z');
                d.setUTCDate(d.getUTCDate() + 1);
                const newDeadline = d.toISOString().slice(0, 10);
                const prevTasks = tasks;
                setTasks(prev => prev.map(t => t.id === id ? { ...t, deadline: newDeadline } : t));
                const ok = await safeWrite(
                    supabase.from('tasks').update({ deadline: newDeadline }).eq('id', id),
                    () => setTasks(prevTasks)
                );
                if (ok) setToast('Deadline reportée de 1 jour');
            };

            const toggleFilter = (type, value) => setFilters(prev => ({ ...prev, [type]: prev[type] === value ? null : value }));

            // Reset positions by priority (re-sort, atomique via RPC)
            const resetByDeadlineAndPriority = async () => {
                const scoped = scope === null
                    ? [...tasks]
                    : tasks.filter(t => getTaskScope(t.category, categories) === scope);
                const resorted = [...scoped].sort((a, b) => {
                    if (a.done !== b.done) return a.done ? 1 : -1;
                    if (a.deadline && b.deadline) {
                        const diff = new Date(a.deadline) - new Date(b.deadline);
                        if (diff !== 0) return diff;
                    }
                    if (a.deadline && !b.deadline) return -1;
                    if (!a.deadline && b.deadline) return 1;
                    return priNum(getEffectivePriority(a)) - priNum(getEffectivePriority(b));
                });
                const updates = resorted.map((t, i) => ({ id: t.id, position: i }));
                const prevTasks = tasks;
                setTasks(prev => prev.map(t => { const u = updates.find(u => u.id === t.id); return u ? { ...t, position: u.position } : t; }));
                const ok = await safeWrite(
                    supabase.rpc('update_task_positions', { p_updates: updates }),
                    () => setTasks(prevTasks)
                );
                if (ok) setToast('Trié par deadline et priorité !');
            };

            // ---- Derived ----
            const scopeTasks = scope === null
                ? tasks
                : tasks.filter(t => getTaskScope(t.category, categories) === scope);
            const catFiltered = scopeTasks.filter(t => {
                if (filters.category && t.category !== filters.category) return false;
                if (filters.priority && getEffectivePriority(t) !== filters.priority) return false;
                return true;
            });
            // Time filter (all filters also include overdue tasks)
            const timeFiltered = catFiltered.filter(t => {
                if (t.done || timeFilter === 'all') return true;
                if (!t.deadline) return true;
                const d = getDaysUntil(t.deadline);
                if (d < 0) return true; // always show overdue
                if (timeFilter === 'today') return d === 0;
                if (timeFilter === 'tomorrow') return d <= 1;
                if (timeFilter === '7days') return d <= 7;
                return true;
            });
            // Search filter
            const filtered = timeFiltered.filter(t => {
                if (!searchQuery.trim()) return true;
                const q = searchQuery.toLowerCase();
                if (t.text?.toLowerCase().includes(q)) return true;
                if (t.detail?.toLowerCase().includes(q)) return true;
                if (t.deadline?.includes(q)) return true;
                if (formatDeadline(t.deadline).toLowerCase().includes(q)) return true;
                if ((t.subtasks || []).some(s => s.text?.toLowerCase().includes(q))) return true;
                const cat = getCatInfo(t.category, categories);
                if (cat.label.toLowerCase().includes(q)) return true;
                return false;
            });
            const sorted = sortTasks(filtered);
            const doneCount = catFiltered.filter(t => t.done).length;

            // Stats (across all scope tasks, not just filtered)
            const overdueTasks = scopeTasks.filter(t => !t.done && t.deadline && getDaysUntil(t.deadline) < 0);
            const todayTasks = scopeTasks.filter(t => !t.done && t.deadline && getDaysUntil(t.deadline) === 0);
            const weekTasks = scopeTasks.filter(t => !t.done && t.deadline && getDaysUntil(t.deadline) >= 0 && getDaysUntil(t.deadline) <= 7);
            const todayDone = scopeTasks.filter(t => t.done && t.done_at && new Date(t.done_at).toDateString() === new Date().toDateString()).length;

            // ---- Auth screens (login / signup / reset) ----
            if (authLoading) return (
                <div className="loading-screen">
                    <div className="loader" />
                    <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>Chargement...</div>
                </div>
            );
            if (!session) return <window.TaskFlowAuth.AuthScreen Logo={TaskFlowLogo} />;

            // ---- Loading tasks after login ----
            if (loading) return (
                <div className="loading-screen">
                    <div className="loader" />
                    <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>Chargement...</div>
                </div>
            );

            // ---- Main app ----
            return (
                <div className="app">
                    {toast && <Toast message={toast} onDone={() => setToast(null)} />}

                    <div className="header">
                        <div className="header-left">
                            <TaskFlowLogo size={28} />
                            <div className="stats">{doneCount}/{catFiltered.length} complétées</div>
                        </div>
                        <div className="header-right" style={{ position: 'relative' }} ref={settingsRef}>
                            <button className="icon-btn" onClick={() => setSettingsOpen(!settingsOpen)} title="Paramètres">
                                ⚙️
                            </button>
                            {settingsOpen && (
                                <div className="settings-menu">
                                    <button className="settings-item" onClick={() => { setCatModal(true); setSettingsOpen(false); }}>
                                        🏷️ Gérer les catégories
                                    </button>
                                    <button className="settings-item" onClick={() => { setCalendarModal(true); setSettingsOpen(false); }}>
                                        📅 Calendrier partagé
                                    </button>
                                    <button className="settings-item" onClick={() => { setPinModal(true); setSettingsOpen(false); }}>
                                        🔐 Changer le code PIN
                                    </button>
                                    <button className="settings-item" onClick={async () => {
                                        setSettingsOpen(false);
                                        localStorage.removeItem('lastNotifDate');
                                        await window.TaskFlowAuth.authService.signOut();
                                    }}>
                                        🚪 Se déconnecter
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="stats-strip">
                        <div className="stat-card stat-overdue">
                            <div className="stat-num">{overdueTasks.length}</div>
                            <div className="stat-label">En retard</div>
                        </div>
                        <div className="stat-card stat-today">
                            <div className="stat-num">{todayTasks.length}</div>
                            <div className="stat-label">Aujourd'hui</div>
                        </div>
                        <div className="stat-card stat-week">
                            <div className="stat-num">{weekTasks.length}</div>
                            <div className="stat-label">Cette sem.</div>
                        </div>
                        <div className="stat-card stat-done">
                            <div className="stat-num">{todayDone}</div>
                            <div className="stat-label">Faites ajd</div>
                        </div>
                    </div>

                    <div className="search-row">
                        <div className="search-bar">
                            <span className="search-icon">🔍</span>
                            <input
                                type="text" value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                placeholder="Rechercher une tâche..."
                            />
                        </div>
                        <div className="view-btns-mobile">
                            <button className={`view-btn ${view === 'list' ? 'active' : ''}`} onClick={() => setView('list')}>Liste</button>
                            <button className={`view-btn ${view === 'calendar' ? 'active' : ''}`} onClick={() => setView('calendar')}>Cal.</button>
                        </div>
                    </div>

                    <div className="filter-row-compact">
                        <select className={`filter-select ${timeFilter !== 'all' ? 'has-value' : ''}`}
                            value={timeFilter} onChange={e => setTimeFilter(e.target.value)}>
                            <option value="all">🕐 Période</option>
                            <option value="today">Aujourd'hui</option>
                            <option value="tomorrow">Demain</option>
                            <option value="7days">7 jours</option>
                        </select>
                        <select className={`filter-select ${filters.category ? 'has-value' : ''}`}
                            value={filters.category || ''} onChange={e => setFilters(prev => ({ ...prev, category: e.target.value || null }))}>
                            <option value="">📂 Catégorie</option>
                            {(scope === null ? [...categories.pro, ...categories.perso] : categories[scope]).map(cat => (
                                <option key={cat.id} value={cat.id}>{cat.emoji} {cat.label}</option>
                            ))}
                        </select>
                        <select className={`filter-select ${filters.priority ? 'has-value' : ''}`}
                            value={filters.priority || ''} onChange={e => setFilters(prev => ({ ...prev, priority: e.target.value || null }))}>
                            <option value="">⚡ Priorité</option>
                            {Object.entries(PRIORITIES).map(([key, val]) => (
                                <option key={key} value={key}>{val.emoji} {val.label}</option>
                            ))}
                        </select>
                    </div>

                    <div className="view-toggle-row">
                        <div className="left-section">
                            <span className="section-title">
                                {view === 'list' ? (showAllDone ? `${sorted.filter(t=>t.done).length} complétée${sorted.filter(t=>t.done).length > 1 ? 's' : ''}` : `${sorted.filter(t=>!t.done).length} tâche${sorted.filter(t=>!t.done).length > 1 ? 's' : ''}`) : 'Calendrier'}
                            </span>
                            {view === 'list' && (
                                <React.Fragment>
                                    <button className="sort-btn" onClick={resetByDeadlineAndPriority} title="Trier par deadline et priorité">↕ Trier</button>
                                    <button className={`sort-btn ${showAllDone ? 'active-done-filter' : ''}`}
                                        onClick={() => { setShowAllDone(!showAllDone); setShowDoneCount(showAllDone ? 3 : 10); }}
                                        style={showAllDone ? { background: 'var(--done-color)', color: 'white', borderColor: 'var(--done-color)' } : {}}
                                    >✅ Faites</button>
                                    <select className={`scope-select ${scope ? 'has-value' : ''}`}
                                        value={scope || ''}
                                        onChange={e => { const v = e.target.value || null; setScope(v); setFilters({ category: null, priority: null }); }}
                                        title="Filtrer par scope"
                                    >
                                        <option value="">🌐 Tout</option>
                                        <option value="pro">💼 Pro</option>
                                        <option value="perso">🏠 Perso</option>
                                    </select>
                                </React.Fragment>
                            )}
                        </div>
                        <div className="view-btns view-btns-desktop">
                            <button className={`view-btn ${view === 'list' ? 'active' : ''}`} onClick={() => setView('list')}>Liste</button>
                            <button className={`view-btn ${view === 'calendar' ? 'active' : ''}`} onClick={() => setView('calendar')}>Calendrier</button>
                        </div>
                    </div>

                    {view === 'list' ? (() => {
                        const activeTasks = showAllDone ? [] : sorted.filter(t => !t.done);
                        const doneTasks = showAllDone ? sorted.filter(t => t.done) : sorted.filter(t => t.done);
                        const visibleDone = doneTasks.slice(0, showDoneCount);
                        const hasMoreDone = doneTasks.length > showDoneCount;
                        const allTasks = showAllDone ? [] : activeTasks;

                        if (showAllDone) {
                            return (
                                <React.Fragment>
                                    <div className="done-separator">
                                        ✅ {doneTasks.length} tâche{doneTasks.length > 1 ? 's' : ''} complétée{doneTasks.length > 1 ? 's' : ''}
                                    </div>
                                    {doneTasks.length === 0 ? (
                                        <div className="empty-state"><div className="emoji">🎯</div><div className="msg">Aucune tâche complétée</div></div>
                                    ) : doneTasks.slice(0, showDoneCount).map((task, idx) => (
                                        <TaskCard key={task.id} task={task} tasks={tasks} isBlocked={isBlocked}
                                            onToggle={toggleDone} onEdit={(id) => setModal(id)} onDelete={requestDelete}
                                            onCustomDragStart={onCustomDragStart} categories={categories}
                                            onMoveUp={onMoveUp} onMoveDown={onMoveDown} onPushDeadline={pushDeadline}
                                            isFirst={idx === 0} isLast={idx === doneTasks.length - 1}
                                            onToggleSubtask={toggleSubtask}
                                            isDraggingRef={isDraggingRef}
                                        />
                                    ))}
                                    {doneTasks.length > showDoneCount && (
                                        <button className="show-more-btn" onClick={() => setShowDoneCount(prev => prev + 10)}>
                                            Voir plus ({doneTasks.length - showDoneCount} restantes)
                                        </button>
                                    )}
                                    {showDoneCount > 3 && (
                                        <button className="show-more-btn" onClick={() => setShowDoneCount(3)}>
                                            Réduire
                                        </button>
                                    )}
                                </React.Fragment>
                            );
                        }

                        return (
                            <React.Fragment>
                                {activeTasks.length === 0 && doneTasks.length === 0 ? (
                                    <div className="empty-state"><div className="emoji">✨</div><div className="msg">Aucune tâche ici</div></div>
                                ) : (
                                    <React.Fragment>
                                        {activeTasks.map((task, idx) => (
                                            <TaskCard key={task.id} task={task} tasks={tasks} isBlocked={isBlocked}
                                                onToggle={toggleDone} onEdit={(id) => setModal(id)} onDelete={requestDelete}
                                                onCustomDragStart={onCustomDragStart} categories={categories}
                                                onMoveUp={onMoveUp} onMoveDown={onMoveDown} onPushDeadline={pushDeadline}
                                                isFirst={idx === 0} isLast={idx === activeTasks.length - 1}
                                                onToggleSubtask={toggleSubtask}
                                            />
                                        ))}
                                        {doneTasks.length > 0 && (
                                            <React.Fragment>
                                                <div className="done-separator">✅ Complétées ({doneTasks.length})</div>
                                                {visibleDone.map((task, idx) => (
                                                    <TaskCard key={task.id} task={task} tasks={tasks} isBlocked={isBlocked}
                                                        onToggle={toggleDone} onEdit={(id) => setModal(id)} onDelete={requestDelete}
                                                        onCustomDragStart={onCustomDragStart} categories={categories}
                                                        onMoveUp={onMoveUp} onMoveDown={onMoveDown} onPushDeadline={pushDeadline}
                                                        isFirst={false} isLast={false}
                                                        onToggleSubtask={toggleSubtask}
                                                    />
                                                ))}
                                                {hasMoreDone && (
                                                    <button className="show-more-btn" onClick={() => setShowDoneCount(prev => prev + 10)}>
                                                        Voir plus ({doneTasks.length - showDoneCount} restantes)
                                                    </button>
                                                )}
                                                {showDoneCount > 3 && (
                                                    <button className="show-more-btn" onClick={() => setShowDoneCount(3)}>
                                                        Réduire
                                                    </button>
                                                )}
                                            </React.Fragment>
                                        )}
                                    </React.Fragment>
                                )}
                            </React.Fragment>
                        );
                    })() : (
                        <CalendarView tasks={filtered} onEdit={(id) => setModal(id)} onToggle={toggleDone} categories={categories} />
                    )}

                    <button className="fab" onClick={() => setModal('add')} title="Nouvelle tâche">+</button>

                    {modal !== null && (
                        <TaskModal
                            task={typeof modal === 'number' ? tasks.find(t => t.id === modal) : null}
                            tasks={tasks} onSubmit={handleSubmit} onClose={() => setModal(null)}
                            categories={categories}
                        />
                    )}

                    {pinModal && (
                        <window.TaskFlowAuth.PasswordChangeModal onClose={() => setPinModal(false)} onChanged={() => setToast('Code PIN modifié !')} />
                    )}

                    {catModal && (
                        <CategoryManagerModal categories={categories} onClose={() => setCatModal(false)} onSave={saveCategories} />
                    )}

                    {calendarModal && (
                        <CalendarShareModal onClose={() => setCalendarModal(false)} />
                    )}

                    {confirmDelete && (
                        <ConfirmDialog
                            title="Supprimer cette tâche ?"
                            message="Cette action est irréversible. La tâche et ses sous-tâches seront définitivement supprimées."
                            onConfirm={handleDelete}
                            onCancel={() => setConfirmDelete(null)}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
